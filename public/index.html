<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRStreak - Full 7-Section ICIR Academy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #666666;
            --duo-blue: #1cb0f6;
            --duo-green: #58cc02;
            --duo-orange: #ff9600;
            --duo-red: #ea2b2b;
            --border-color: #e5e5e5;
            --border-width: 2px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 90px; }
        header { background-color: var(--card-bg); border-bottom: var(--border-width) solid var(--border-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 800; color: var(--duo-blue); }
        .stats-banner { display: flex; align-items: center; gap: 20px; font-weight: 700; }
        .stat-badge { display: flex; align-items: center; gap: 6px; }
        .stat-badge.streak { color: var(--duo-orange); }
        .stat-badge.xp { color: var(--duo-blue); }
        .auth-status-zone { display: flex; align-items: center; gap: 10px; border-left: 2px solid var(--border-color); padding-left: 15px; }
        .container { max-width: 1000px; width: 100%; margin: 30px auto; padding: 0 20px; flex-grow: 1; }
        .screen { display: none; }
        .screen.active { display: block; }
        .dashboard-header { text-align: center; margin-bottom: 30px; }
        .dashboard-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .dashboard-subtitle { font-size: 1.1rem; color: var(--text-muted); }
        .module-group { margin-bottom: 40px; background: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 16px; padding: 20px; }
        .section-heading { font-size: 1.4rem; font-weight: 800; color: #111; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .module-card { border-left: 4px solid var(--duo-blue); background: #fafafa; padding: 20px; margin-bottom: 15px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .module-card:hover { background: #f0f7ff; }
        .module-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 5px; color: #111; }
        .module-desc { font-size: 0.95rem; color: var(--text-muted); }
        .lesson-container { background: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 24px; padding: 40px; min-height: 550px; display: flex; flex-direction: column; justify-content: space-between; }
        .lesson-nav { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .exit-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .lesson-progress-bg { flex-grow: 1; height: 16px; background: #e5e5e5; border-radius: 20px; overflow: hidden; }
        .lesson-progress-fill { height: 100%; background: var(--duo-blue); width: 0%; transition: width 0.3s ease; }
        .content-pane { font-size: 1.15rem; line-height: 1.65; color: #333; flex-grow: 1; overflow-y: auto; margin-bottom: 30px; }
        .content-pane h2 { font-size: 1.7rem; font-weight: 800; margin-bottom: 20px; color: #111; }
        .content-pane h3 { font-size: 1.3rem; font-weight: 700; margin-top: 25px; margin-bottom: 12px; color: #222; }
        .content-pane p { margin-bottom: 15px; }
        .content-pane ul { margin-left: 25px; margin-bottom: 20px; }
        .content-pane li { margin-bottom: 8px; }
        .options-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .option-item { border: var(--border-width) solid var(--border-color); border-bottom: 4px solid var(--border-color); border-radius: 14px; padding: 18px 24px; font-size: 1.1rem; font-weight: 600; text-align: left; background: white; cursor: pointer; width: 100%; }
        .option-item.selected { background-color: #ddf4ff; border-color: var(--duo-blue); color: #186590; }
        .tray-feedback { border-radius: 16px; padding: 20px; margin-top: 25px; display: none; gap: 15px; font-size: 1.1rem; }
        .tray-feedback.correct { display: flex; background: #d7ffb8; color: #257e0a; border: 2px solid #b8f28a; }
        .tray-feedback.incorrect { display: flex; background: #ffdfe0; color: #ea2b2b; border: 2px solid #ffb8b8; }
        .footer-action-row { display: flex; justify-content: flex-end; margin-top: 25px; border-top: var(--border-width) solid var(--border-color); padding-top: 20px; }
        .footer-btn { background-color: var(--duo-blue); color: white; border: none; border-bottom: 4px solid rgba(0,0,0,0.2); padding: 16px 32px; border-radius: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .global-status-dock { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-top: var(--border-width) solid var(--border-color); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 99; }
        .global-progress-dock-wrapper { width: 55%; display: flex; align-items: center; gap: 15px; }
        .global-dock-bar { flex-grow: 1; height: 14px; background: #e5e5e5; border-radius: 10px; overflow: hidden; }
        .global-dock-fill { height: 100%; background: linear-gradient(90deg, #1cb0f6, #58cc02); width: 0%; transition: width 0.5s ease; }
        .auth-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .auth-modal.active { display: flex; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 440px; text-align: center; border: var(--border-width) solid var(--border-color); }
        .logout-btn { background: none; border: 1px solid var(--border-color); padding: 5px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area"><i class="fa-solid fa-graduation-cap"></i> <span>IRStreak Academy</span></div>
        <div class="stats-banner">
            <div class="stat-badge streak"><i class="fa-solid fa-fire"></i> <span id="streak-val">1</span> Day</div>
            <div class="stat-badge xp"><i class="fa-solid fa-bolt"></i> <span id="xp-val">0</span> XP</div>
            <div class="auth-status-zone" id="auth-header-wrapper"></div>
        </div>
    </header>

    <div class="container">
        <div id="dashboard-screen" class="screen active">
            <div class="dashboard-header">
                <h2 class="dashboard-title">International Certificate in Investor Relations (ICIR)</h2>
                <p class="dashboard-subtitle" id="sync-status-indicator">Initializing syllabus configurations...</p>
            </div>
            <div id="curriculum-tree-root"></div>
        </div>

        <div id="lesson-screen" class="screen">
            <div class="lesson-container">
                <div>
                    <div class="lesson-nav">
                        <button class="exit-btn" onclick="exitActiveRuntime()"><i class="fa-solid fa-xmark"></i></button>
                        <div class="lesson-progress-bg"><div id="runtime-progress-bar" class="lesson-progress-fill"></div></div>
                    </div>
                    <div id="runtime-content-pane" class="content-pane"></div>
                </div>
                <div>
                    <div id="tray-feedback-box" class="tray-feedback"></div>
                    <div class="footer-action-row">
                        <button id="runtime-action-btn" class="footer-btn" onclick="handleStepTransition()">Check Answer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-modal-screen" class="auth-modal">
        <div class="auth-card">
            <i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: var(--duo-blue); margin-bottom: 15px;"></i>
            <h3>D1 Cloud Profile Synchronization</h3>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">Sign in to securely backup your 40-hour study progress map directly to Cloudflare D1.</p>
            <div style="display: flex; justify-content: center; margin-bottom: 20px;"><div id="google-signin-btn-target"></div></div>
            <button class="inline-link-btn" style="background:#ccc;" onclick="closeAuthPortal()">Continue as Guest</button>
        </div>
    </div>

    <div class="global-status-dock">
        <div class="global-meta"><span>Curriculum Mastery Track</span><br><strong id="global-percentage-label">0% Complete</strong></div>
        <div class="global-progress-dock-wrapper">
            <div class="global-dock-bar"><div id="global-progress-bar-fill" class="global-dock-fill"></div></div>
        </div>
        <div style="font-weight: 800; color: var(--duo-green); font-size: 1.1rem;"><i class="fa-solid fa-trophy"></i> Certified</div>
    </div>

    <script>
        const ICIR_CURRICULUM_DATABASE = [
            {
                section: "Section 1",
                title: "Introduction to Investor Relations",
                modules: [
                    {
                        id: "s1_m1",
                        title: "1.1 Core Principles & Value Drivers",
                        desc: "High-level overview of market context, fair valuation, the 5 Cs framework, and code of conduct rules.",
                        steps: [
                            { type: "text", title: "Why Companies Have IR Functions", html: "<p>Public enterprises operate within a crowded marketplace for capital[cite: 1, 3]. IR acts as a bidirectional conduit managing market expectations to establish a fair valuation based on structural performance rather than speculation[cite: 1, 3, 4].</p><h3>The 5 Cs of IR Communications:</h3><ul><li><strong>Commitment:</strong> Dedication supported from the top down by the CEO and CFO[cite: 1, 5].</li><li><strong>Consistency:</strong> Continuous disclosure through both up and down business cycles[cite: 1].</li><li><strong>Clarity:</strong> Straightforward presentation delivering brevity[cite: 1].</li><li><strong>Credibility:</strong> Authoritative domain expertise building institutional trust[cite: 1].</li><li><strong>Conduit:</strong> Functioning as a bidirectional information network[cite: 1].</li></ul>" },
                            { type: "mcq", prompt: "Which of the '5 Cs' requires the Investor Relations Officer to behave as a bidirectional information network between executive matrices and capital markets?", options: ["Credibility", "Conduit", "Commitment"], answer: "Conduit", explain: "The Conduit principle states that IR needs to be seen as the manager of the two-way information flow between the company and its investors[cite: 1]." }
                        ]
                    }
                ]
            },
            {
                section: "Section 2",
                title: "Financial Markets",
                modules: [
                    {
                        id: "s2_m1",
                        title: "2.1 Primary and Secondary Market Execution",
                        desc: "The transaction ecosystem, execution lifecycle, quote vs order-driven venues, and dark pools.",
                        steps: [
                            { type: "text", title: "Market Execution Frameworks", html: "<p>Capital raising happens in primary markets, while subsequent trading occurs anonymously on secondary markets without financing the issuer[cite: 2, 4]. Execution transitions sequentially from agreement to central clearing house risk insulation, concluding with physical electronic settlement on a T+2 baseline[cite: 2].</p><h3>Trading Architecture:</h3><ul><li><strong>Quote-driven:</strong> Dependent on regulated market makers holding inventory on balance sheets[cite: 2].</li><li><strong>Order-driven:</strong> Directly matches matching entries on order books without counterparty inventory risk[cite: 2].</li><li><strong>Dark Pools:</strong> Venues offering hidden blocks to prevent severe market impact, restricted by MiFID II volume caps[cite: 2].</li></ul>" },
                            { type: "mcq", prompt: "What is the standard electronic share settlement timeline on the London Stock Exchange?", options: ["T+1", "T+2", "T+3"], answer: "T+2", explain: "Settlement on the LSE is electronically finalized on a Trade Date plus 2 Business Days (T+2) horizon[cite: 2]." }
                        ]
                    }
                ]
            },
            {
                section: "Section 3",
                title: "Corporate Entities and Governance",
                modules: [
                    {
                        id: "s3_m1",
                        title: "3.1 Corporate Structures & Share Capital Mechanics",
                        desc: "Syllabus tracking of PLCs vs Ltds, share buybacks, and Section 793 share ownership investigations.",
                        steps: [
                            { type: "text", title: "Statutory Capital Frameworks", html: "<p>Public Limited Companies (PLCs) require a minimum share capital of £50,000, 2 directors, and a qualified company secretary, unlike private Ltds[cite: 3, 4].</p><h3>Section 793 Investigation Mechanics:</h3><p>Under CA 2006 s793, public entities have the explicit statutory power to look past multi-layered nominee accounts to discover ultimate beneficial owners[cite: 3]. Recipients failing to reply are subject to court-enforced sanctions including voting restrictions and freezing of dividend distributions[cite: 3].</p>" },
                            { type: "mcq", prompt: "What is the statutory minimum share capital requirement for a Public Limited Company in the UK?", options: ["£10,000", "£30,000", "£50,000"], answer: "£50,000", explain: "A PLC must maintain a minimum allotted share capital of £50,000 with each share at least 25% paid up[cite: 3, 4]." }
                        ]
                    }
                ]
            },
            {
                section: "Section 4",
                title: "Market Conduct",
                modules: [
                    {
                        id: "s4_m1",
                        title: "4.1 Market Misconduct & Disclosure Duties",
                        desc: "Precise boundaries of inside information, Article 19(11) closed periods, and major notifications.",
                        steps: [
                            { type: "text", title: "Insider Dealing and Transparency rules", html: "<p>Inside information is precise, unreleased data that a reasonable investor would use for investment mapping[cite: 4]. MAR mandates a strict 30-day closed period before results where PDMRs are blocked from dealing[cite: 4].</p><h3>Major Shareholdings Disclosure:</h3><p>Shareholders must notify issuers when holdings pass certain percentage thresholds to prevent hidden accumulations of corporate control[cite: 4]. In the UK, this notifiable threshold parameter initializes at 3%[cite: 4].</p>" },
                            { type: "mcq", prompt: "What is the mandatory MAR closed period timeframe prior to half-year or preliminary year-end announcements?", options: ["14 Days", "30 Days", "60 Days"], answer: "30 Days", explain: "Article 19(11) of the Market Abuse Regulation enforces an absolute 30-day closed period for PDMR transactions[cite: 4]." }
                        ]
                    }
                ]
            },
            {
                section: "Section 5",
                title: "Reporting",
                modules: [
                    {
                        id: "s5_m1",
                        title: "5.1 Periodic Disclosures & Structured Formats",
                        desc: "Mandatory vs voluntary timelines, Strategic Report components, ESEF digital tagging, and ESG disclosure standards.",
                        steps: [
                            { type: "text", title: "The Periodic Corporate Reporting Suite", html: "<p>Listed companies utilize a highly structured reporting cycle to communicate financial performance and operational updates[cite: 5, 2, 3]. Reports are strictly governed by regulatory deadlines calculated from the close of the reporting period[cite: 5, 3].</p><h3>Mandatory Components & Formats:</h3><ul><li><strong>Strategic Report:</strong> The primary forward-looking vehicle presenting a fair review of the business, its business model, KPIs, and principal risks[cite: 5].</li><li><strong>Digital ESEF Tagging:</strong> Reports must be issued in structured electronic format using inline XBRL tags to facilitate efficient data extraction by analysts[cite: 5].</li><li><strong>Sustainability Standards:</strong> Transitioning behind the International Sustainability Standards Board (ISSB) frameworks (IFRS S1 & S2) to introduce a global baseline for climate-related financial exposures[cite: 5].</li></ul>" },
                            { type: "mcq", prompt: "Under current listing transparency directives, within what timeframe following the financial year-end must an annual report be published?", options: ["3 Months", "4 Months", "6 Months"], answer: "4 Months", explain: "Directives mandate that an entity's complete audited annual report must be made public within 4 months of the year-end[cite: 5, 3]." }
                        ]
                    }
                ]
            },
            {
                section: "Section 6",
                title: "Accounting, Valuation and Investment Principles",
                modules: [
                    {
                        id: "s6_m1",
                        title: "6.1 Financial Statements, Ratios, and Valuation Metrics",
                        desc: "Deep tracking of Balance Sheets, Cash Flows, Profit vs Cash, Liquidity/Solvency ratios, WACC, and CAPM calculations.",
                        steps: [
                            { type: "text", title: "The Mechanics of Corporate Finance", html: "<p>Financial statements give information on profitability, cash flow, and capital structure[cite: 6, 3]. Profitability numbers utilize accrual matching conventions, making them structurally distinct from cash flows[cite: 6, 7].</p><h3>Essential Financial Frameworks:</h3><ul><li><strong>Liquidity (Current Ratio):</strong> Current Assets / Current Liabilities[cite: 6].</li><li><strong>Solvency (Gearing):</strong> Debt / Capital Employed, tracking the risk structure of capital allocation[cite: 6].</li><li><strong>WACC:</strong> Evaluates the combined post-tax hurdle rate of debt and equity funding blocks[cite: 6].</li><li><strong>CAPM Formula:</strong> $R = R_f + \\beta \\times (R_m - R_f)$, outlining the required rate of return for an asset based on its market risk[cite: 6].</li></ul>" },
                            { type: "mcq", prompt: "If a company presents Current Assets of £200 and Current Liabilities of £125, what is its exact Current Ratio?", options: ["1.2", "1.6", "2.0"], answer: "1.6", explain: "The current liquidity ratio is computed as £200 divided by £125, matching an output profile of 1.6[cite: 6]." }
                        ]
                    }
                ]
            },
            {
                section: "Section 7",
                title: "Effective IR in Practice",
                modules: [
                    {
                        id: "s7_m1",
                        title: "7.1 Execution of the Practical IR Lifecycle",
                        desc: "Managing the annual calendar, results day, consensus models, perception studies, and investor targeting techniques.",
                        steps: [
                            { type: "text", title: "Real-World IR Operations", html: "<p>Practical investor relations combines corporate strategy with rigorous operational event execution throughout the financial year[cite: 7, 1].</p><h3>Core Operational Domains:</h3><ul><li><strong>Consensus Management:</strong> Aggregating and tracking all published sell-side models to calculate the mean expectation, ensuring no material deviation exists vs internal budgets[cite: 7].</li><li><strong>Shareholder Profiling:</strong> Utilizing electronic nominee unpicking to track buy-side investment styles (Growth, Value, GARP)[cite: 7].</li><li><strong>Crisis Control:</strong> Deploying structured, fact-checked holding statements to stabilize market sentiment when unforeseen events hit[cite: 7].</li></ul>" },
                            { type: "mcq", prompt: "What term describes the arithmetic mean of all earnings and revenue forecasts published by equity research analysts covering a stock?", options: ["Internal Budget", "Market Consensus", "The Valuation Multiple"], answer: "Market Consensus", explain: "Market consensus provides the unique publicly available average expectation track on which a company's trading value is based[cite: 7]." }
                        ]
                    }
                ]
            }
        ];

        let appState = { userEmail: null, totalXP: 0, streakCount: 1, progressMap: {} };
        let runtime = { activeModule: null, activeStepIndex: 0, chosenOption: null, isEvaluated: false };

        window.addEventListener("DOMContentLoaded", () => {
            initializeRuntimeEnvironment();
            renderDashboardTree();
            evaluateGlobalProgress();
            checkAndTriggerAuthFlow();
        });

        function initializeRuntimeEnvironment() {
            const cachedAuth = localStorage.getItem("ICIR_LOGGED_USER");
            if (cachedAuth) {
                appState.userEmail = cachedAuth;
                const cloudData = localStorage.getItem(`ICIR_DATA_${appState.userEmail}`);
                if (cloudData) {
                    const parsed = JSON.parse(cloudData);
                    appState.totalXP = parsed.xp || 0;
                    appState.streakCount = parsed.streak || 1;
                    appState.progressMap = parsed.progress || {};
                }
            } else {
                const guestData = localStorage.getItem("ICIR_GUEST_DATA");
                if (guestData) {
                    const parsed = JSON.parse(guestData);
                    appState.totalXP = parsed.xp || 0;
                    appState.streakCount = parsed.streak || 1;
                    appState.progressMap = parsed.progress || {};
                }
            }
            refreshHeaderStatsDocks();
        }

        function checkAndTriggerAuthFlow() {
            if (!appState.userEmail && !localStorage.getItem("ICIR_GUEST_SKIP")) {
                document.getElementById("auth-modal-screen").classList.add("active");
                if (typeof google !== "undefined") {
                    google.accounts.id.initialize({
                        client_id: "251456435715-ekhjb33hh3ldl67sgc7ubj38a7d50mr6.apps.googleusercontent.com",
                        callback: handleGoogleIdentityCatch
                    });
                    google.accounts.id.renderButton(document.getElementById("google-signin-btn-target"), { theme: "outline", size: "large" });
                }
            }
        }

        async function handleGoogleIdentityCatch(response) {
            localStorage.setItem("GOOGLE_JWT_TOKEN", response.credential);
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            if (payload.email_verified) {
                appState.userEmail = payload.email;
                localStorage.setItem("ICIR_LOGGED_USER", appState.userEmail);
                commitSystemStateToStorage();
                closeAuthPortal();
                refreshHeaderStatsDocks();
                renderDashboardTree();
                evaluateGlobalProgress();
            }
        }

        function closeAuthPortal() {
            localStorage.setItem("ICIR_GUEST_SKIP", "true");
            document.getElementById("auth-modal-screen").classList.remove("active");
            refreshHeaderStatsDocks();
        }

        function executeUserLogout() {
            localStorage.removeItem("ICIR_LOGGED_USER");
            localStorage.removeItem("GOOGLE_JWT_TOKEN");
            localStorage.removeItem("ICIR_GUEST_SKIP");
            appState.userEmail = null; appState.totalXP = 0; appState.streakCount = 1; appState.progressMap = {};
            initializeRuntimeEnvironment(); refreshHeaderStatsDocks(); renderDashboardTree(); evaluateGlobalProgress(); checkAndTriggerAuthFlow();
        }

        function refreshHeaderStatsDocks() {
            document.getElementById("xp-val").innerText = appState.totalXP;
            document.getElementById("streak-val").innerText = appState.streakCount;
            const indicator = document.getElementById("sync-status-indicator");
            const headerWrapper = document.getElementById("auth-header-wrapper");
            if (appState.userEmail) {
                indicator.innerHTML = `<span style="color: var(--duo-green); font-weight:700;"><i class="fa-solid fa-cloud"></i> D1 Synchronized: ${appState.userEmail}</span>`;
                headerWrapper.innerHTML = `<button class="logout-btn" onclick="executeUserLogout()">Logout</button>`;
            } else {
                indicator.innerHTML = `<span style="color: var(--duo-orange); font-weight:700;"><i class="fa-solid fa-clock"></i> Local Mode. <a href="#" style="color:var(--duo-blue);" onclick="localStorage.removeItem('ICIR_GUEST_SKIP'); checkAndTriggerAuthFlow();">Sync Profile</a> to back up track.</span>`;
                headerWrapper.innerHTML = `<button class="inline-link-btn" onclick="localStorage.removeItem('ICIR_GUEST_SKIP'); checkAndTriggerAuthFlow();">Sync Profile</button>`;
            }
        }

        function commitSystemStateToStorage() {
            const payload = { xp: appState.totalXP, streak: appState.streakCount, progress: appState.progressMap };
            if (appState.userEmail) {
                localStorage.setItem(`ICIR_DATA_${appState.userEmail}`, JSON.stringify(payload));
            } else {
                localStorage.setItem("ICIR_GUEST_DATA", JSON.stringify(payload));
            }
            refreshHeaderStatsDocks();
        }

        function renderDashboardTree() {
            const treeRoot = document.getElementById("curriculum-tree-root");
            treeRoot.innerHTML = "";
            ICIR_CURRICULUM_DATABASE.forEach(sec => {
                const group = document.createElement("div");
                group.className = "module-group";
                group.innerHTML = `<div class="section-heading"><span>${sec.section}: ${sec.title}</span></div>`;
                sec.modules.forEach(mod => {
                    const pct = appState.progressMap[mod.id] || 0;
                    const card = document.createElement("div");
                    card.className = "module-card";
                    card.onclick = () => spinUpModuleRuntime(mod.id);
                    card.innerHTML = `
                        <div class="module-title">${mod.title}</div>
                        <div class="module-desc" style="margin-bottom:10px;">${mod.desc}</div>
                        <div class="global-progress-dock-wrapper" style="width:100%;">
                            <div class="global-dock-bar"><div class="global-dock-fill" style="width:${pct}%; background:var(--duo-green);"></div></div>
                            <span style="font-weight:700; font-size:0.85rem; color:var(--text-muted);">${Math.round(pct)}%</span>
                        </div>
                    `;
                    group.appendChild(card);
                });
                treeRoot.appendChild(group);
            });
        }

        function spinUpModuleRuntime(moduleId) {
            let found = null;
            ICIR_CURRICULUM_DATABASE.forEach(sec => {
                const match = sec.modules.find(m => m.id === moduleId);
                if (match) found = match;
            });
            if (!found) return;
            runtime.activeModule = found; runtime.activeStepIndex = 0;
            document.getElementById("dashboard-screen").classList.remove("active");
            document.getElementById("lesson-screen").classList.add("active");
            executeStepLoad();
        }

        function executeStepLoad() {
            runtime.chosenOption = null; runtime.isEvaluated = false;
            const feedbackBox = document.getElementById("tray-feedback-box");
            feedbackBox.style.display = "none"; feedbackBox.innerHTML = "";
            const totalSteps = runtime.activeModule.steps.length;
            document.getElementById("runtime-progress-bar").style.width = `${(runtime.activeStepIndex / totalSteps) * 100}%`;
            if (runtime.activeStepIndex >= totalSteps) { finalizeModuleCompletion(); return; }
            const stepData = runtime.activeModule.steps[runtime.activeStepIndex];
            const contentPane = document.getElementById("runtime-content-pane");
            const actionBtn = document.getElementById("runtime-action-btn");
            contentPane.innerHTML = `<h2>${stepData.title || 'Interactive Knowledge Verification'}</h2>`;
            if (stepData.type === "text") {
                contentPane.innerHTML += stepData.html;
                actionBtn.innerText = "Continue Module";
            } else if (stepData.type === "mcq") {
                let optionsHtml = stepData.options.map(opt => `<button class="option-item" onclick="handleOptionSelect(this, \`${opt.replace(/"/g, '&quot;')}\`)">${opt}</button>`).join('');
                contentPane.innerHTML += `<h3>${stepData.prompt}</h3><div class="options-stack">${optionsHtml}</div>`;
                actionBtn.innerText = "Verify Concept";
            }
        }

        function handleOptionSelect(node, optionText) {
            if (runtime.isEvaluated) return;
            document.querySelectorAll(".option-item").forEach(el => el.classList.remove("selected"));
            node.classList.add("selected");
            runtime.chosenOption = optionText;
        }

        function handleStepTransition() {
            const stepData = runtime.activeModule.steps[runtime.activeStepIndex];
            const actionBtn = document.getElementById("runtime-action-btn");
            const feedbackBox = document.getElementById("tray-feedback-box");
            if (stepData.type === "text") {
                runtime.activeStepIndex++; executeStepLoad();
            } else if (stepData.type === "mcq") {
                if (!runtime.chosenOption) return;
                if (!runtime.isEvaluated) {
                    runtime.isEvaluated = true;
                    feedbackBox.style.display = "flex";
                    if (runtime.chosenOption === stepData.answer) {
                        feedbackBox.className = "tray-feedback correct";
                        feedbackBox.innerHTML = `<div><strong>Correct!</strong><br>${stepData.explain}</div>`;
                        appState.totalXP += 25; commitSystemStateToStorage();
                    } else {
                        feedbackBox.className = "tray-feedback incorrect";
                        feedbackBox.innerHTML = `<div><strong>Incorrect Analysis.</strong><br>${stepData.explain}</div>`;
                    }
                    actionBtn.innerText = "Continue";
                } else {
                    runtime.activeStepIndex++; executeStepLoad();
                }
            }
        }

        function finalizeModuleCompletion() {
            appState.progressMap[runtime.activeModule.id] = 100; appState.totalXP += 50; commitSystemStateToStorage();
            confetti({ particleCount: 100, spread: 60 });
            document.getElementById("lesson-screen").classList.remove("active");
            document.getElementById("dashboard-screen").classList.add("active");
            renderDashboardTree(); evaluateGlobalProgress();
        }

        function evaluateGlobalProgress() {
            let totalModules = 0, earnedProgress = 0;
            ICIR_CURRICULUM_DATABASE.forEach(sec => sec.modules.forEach(mod => { totalModules++; earnedProgress += (appState.progressMap[mod.id] || 0); }));
            const overallPct = earnedProgress / totalModules;
            document.getElementById("global-progress-bar-fill").style.width = `${overallPct}%`;
            document.getElementById("global-percentage-label").innerText = `${Math.round(overallPct)}% Complete`;
        }

        function exitActiveRuntime() {
            document.getElementById("lesson-screen").classList.remove("active");
            document.getElementById("dashboard-screen").classList.add("active");
            renderDashboardTree(); evaluateGlobalProgress();
        }
    </script>
</body>
</html>
