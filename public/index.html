<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRStreak Academy</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .module-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .module-card:hover { border-color: #007bff; background: #f0f7ff; }
        .screen { display: none; }
        .screen.active { display: block; }
        .option-item { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; text-align: left; }
        .option-item:hover { background: #eef; }
    </style>
</head>
<body>
    <div class="container">
        <div id="dashboard-screen" class="screen active">
            <h1>IRStreak Academy</h1>
            <p id="status">Loading program...</p>
            <div id="curriculum-tree-root"></div>
        </div>

        <div id="lesson-screen" class="screen">
            <div id="runtime-content-pane"></div>
            <button id="runtime-action-btn" onclick="handleStepTransition()">Next</button>
            <button onclick="document.location.reload()">Back to Dashboard</button>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL API WORKER URL
        const API_URL = "irstreak.dvwillett.workers.dev"; 
        
        let masterCurriculum = [];
        let runtime = { activeModule: null, activeStepIndex: 0 };

        window.addEventListener("DOMContentLoaded", loadSyllabus);

        async function loadSyllabus() {
            try {
                const response = await fetch("https://irstreak.dvwillett.workers.dev/api/syllabus");
                if (!response.ok) throw new Error("Failed to fetch syllabus");
                const rawSteps = await response.json();
                
                let sectionMap = {};
                rawSteps.forEach(step => {
                    if (!sectionMap[step.section]) sectionMap[step.section] = { title: step.section, modules: {} };
                    if (!sectionMap[step.section].modules[step.id]) {
                        sectionMap[step.section].modules[step.id] = { id: step.id, title: step.module_title, steps: [] };
                    }
                    
                    let parsedOptions = [];
                    try {
                        parsedOptions = step.options ? JSON.parse(step.options) : [];
                    } catch(e) { parsedOptions = [step.options]; }

                    sectionMap[step.section].modules[step.id].steps.push({ ...step, options: parsedOptions });
                });

                masterCurriculum = Object.values(sectionMap).map(s => ({ title: s.title, modules: Object.values(s.modules) }));
                renderDashboard();
                document.getElementById("status").innerText = "Program loaded successfully.";
            } catch (e) {
                document.getElementById("status").innerText = "Error: " + e.message;
            }
        }

        function renderDashboard() {
            const root = document.getElementById("curriculum-tree-root");
            root.innerHTML = "";
            masterCurriculum.forEach(sec => {
                root.innerHTML += `<h3>${sec.title}</h3>`;
                sec.modules.forEach(mod => {
                    root.innerHTML += `<div class="module-card" onclick="spinUpModule('${mod.id}')"><strong>${mod.title}</strong></div>`;
                });
            });
        }

        function spinUpModule(id) {
            masterCurriculum.forEach(s => s.modules.forEach(m => { if(m.id === id) runtime.activeModule = m; }));
            runtime.activeStepIndex = 0;
            document.getElementById("dashboard-screen").classList.remove("active");
            document.getElementById("lesson-screen").classList.add("active");
            executeStepLoad();
        }

        function executeStepLoad() {
            const step = runtime.activeModule.steps[runtime.activeStepIndex];
            const pane = document.getElementById("runtime-content-pane");
            pane.innerHTML = `<h2>${step.title}</h2><p>${step.body_content || ''}</p>`;
            
            if (step.step_type === 'mcq') {
                pane.innerHTML += `<h3>${step.prompt}</h3>` + 
                    step.options.map(o => `<button class="option-item" onclick="checkAnswer('${o}', '${step.answer}')">${o}</button>`).join('');
            }
        }

        function checkAnswer(selected, correct) {
            alert(selected === correct ? "Correct!" : "Incorrect. The answer was: " + correct);
        }

        function handleStepTransition() {
            runtime.activeStepIndex++;
            if (runtime.activeStepIndex < runtime.activeModule.steps.length) executeStepLoad();
            else { document.getElementById("lesson-screen").classList.remove("active"); document.getElementById("dashboard-screen").classList.add("active"); }
        }
    </script>
</body>
</html>
